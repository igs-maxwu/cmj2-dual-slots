<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; padding:16px; background:#0b2f5e; font-family:var(--font-body); display:flex; gap:12px; align-items:center; justify-content:center; }
.chip { padding:14px 18px; border-radius:10px; background:#0d2547; color:#fff6da; font-size:12px; font-family:var(--font-num); font-weight:800; text-align:center; }
.g1 { box-shadow: 0 0 24px rgba(255,201,77,0.55), 0 0 48px rgba(255,201,77,0.25); border:1px solid #f5b82a; }
.g2 { box-shadow: 0 0 32px rgba(106,183,255,0.55), 0 0 64px rgba(47,136,232,0.30); border:1px solid #2f88e8; }
.g3 { box-shadow: 0 0 32px rgba(255,138,106,0.55), 0 0 64px rgba(232,74,60,0.30); border:1px solid #e84a3c; }
.g4 { box-shadow: 0 0 18px rgba(88,224,144,0.60); border:1px solid #28c76f; }
.lbl { display:block; font-weight:400; opacity:0.7; font-size:10px; letter-spacing:0.18em; margin-top:2px; font-family:var(--font-body); text-transform:uppercase; }
</style></head><body>
<div class="chip g1">GOLD<span class="lbl">win · title</span></div>
<div class="chip g2">AZURE<span class="lbl">team A</span></div>
<div class="chip g3">VERMIL<span class="lbl">team B</span></div>
<div class="chip g4">GREEN<span class="lbl">CTA</span></div>
</body></html>
