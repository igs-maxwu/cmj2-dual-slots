<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; padding:18px; background: linear-gradient(180deg,#0b2f5e,#061a33); font-family:var(--font-body); display:flex; gap:12px; align-items:center; justify-content:center; }
.frame {
  position:relative; padding:14px 22px; border-radius:12px; color:#fff6da;
  background: var(--surf-panel);
  box-shadow: 0 6px 14px rgba(0,0,0,0.55), 0 2px 3px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,230,160,0.35), inset 0 -2px 4px rgba(0,0,0,0.5);
}
.frame::before {
  content:''; position:absolute; inset:-3px; border-radius:inherit; padding:3px;
  background: var(--grad-gold-v);
  -webkit-mask: linear-gradient(#000,#000) content-box, linear-gradient(#000,#000);
  -webkit-mask-composite: xor; mask-composite: exclude; pointer-events:none;
}
.big { padding:20px 30px; font-size:22px; font-weight:800; font-family:var(--font-title); }
.sm { font-size:13px; }
.lbl { color:#7ea3c7; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; margin-top:4px; font-weight:700; text-align:center; }
.col { display:flex; flex-direction:column; align-items:center; gap:6px; }
</style></head><body>
<div class="col"><div class="frame big">總贏分 $0</div><div class="lbl">Gold Cartouche · LG</div></div>
<div class="col"><div class="frame">押注 $15,000</div><div class="lbl">MD</div></div>
<div class="col"><div class="frame sm">LV.4392</div><div class="lbl">SM</div></div>
</body></html>
