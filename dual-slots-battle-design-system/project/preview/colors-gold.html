<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; padding:16px; background:#061a33; font-family:var(--font-body); display:flex; gap:12px; align-items:center; }
.swatch { flex:1; height:110px; border-radius:10px; display:flex; align-items:flex-end; padding:10px; color:#3a2a05; font-size:12px; font-weight:800; }
.grad { background: var(--grad-gold-v); }
.solid { display:flex; gap:4px; flex:1; }
.solid > div { flex:1; height:110px; border-radius:6px; display:flex; flex-direction:column; justify-content:flex-end; padding:6px; font-size:10px; color:#3a2a05; font-weight:700; }
.solid .hex { opacity:0.7; font-weight:400; }
</style></head><body>
<div class="swatch grad">grad-gold-v</div>
<div class="solid">
  <div style="background:#ffe9a8">pale<div class="hex">#FFE9A8</div></div>
  <div style="background:#ffd54a">light<div class="hex">#FFD54A</div></div>
  <div style="background:#f5b82a">gold<div class="hex">#F5B82A</div></div>
  <div style="background:#e89b1a; color:#fff6da">deep<div class="hex">#E89B1A</div></div>
  <div style="background:#8a5412; color:#fff6da">shadow<div class="hex">#8A5412</div></div>
</div>
</body></html>
