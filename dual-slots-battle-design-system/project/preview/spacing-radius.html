<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; padding:20px; background:#061a33; font-family:var(--font-body); display:flex; gap:14px; align-items:flex-end; justify-content:center; }
.tile { background:#0d2547; border:2px solid #f5b82a; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff6da; font-family:var(--font-num); font-weight:800; font-size:13px; }
.r6 { width:60px; height:60px; border-radius:6px; }
.r10 { width:80px; height:80px; border-radius:10px; }
.r18 { width:100px; height:100px; border-radius:18px; }
.pill { width:140px; height:50px; border-radius:999px; }
.lbl { font-size:9px; opacity:0.7; font-family:var(--font-body); letter-spacing:0.15em; text-transform:uppercase; margin-top:3px; font-weight:700; }
</style></head><body>
<div class="tile r6">6<span class="lbl">small</span></div>
<div class="tile r10">10<span class="lbl">default</span></div>
<div class="tile r18">18<span class="lbl">panel</span></div>
<div class="tile pill">pill<span class="lbl">button</span></div>
</body></html>
