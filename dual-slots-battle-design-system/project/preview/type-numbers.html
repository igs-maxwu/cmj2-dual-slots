<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; padding:20px; background:#020a18; font-family:var(--font-body); display:flex; align-items:center; justify-content:space-around; }
.num { font-family: var(--font-num); font-weight:800; background: var(--grad-gold-text); -webkit-background-clip:text; background-clip:text; color:transparent; -webkit-text-stroke:0.5px #8a5412; filter: drop-shadow(0 2px 0 #8a5412) drop-shadow(0 0 8px rgba(255,201,77,0.4)); font-variant-numeric: tabular-nums; }
.big { font-size:48px; }
.mid { font-size:28px; }
.sm { font-size:18px; }
.lbl { color:#7ea3c7; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; text-align:center; margin-top:4px; font-weight:700; }
.col { display:flex; flex-direction:column; align-items:center; }
</style></head><body>
<div class="col"><div class="num big">×500</div><div class="lbl">Multiplier</div></div>
<div class="col"><div class="num mid">15,866,280</div><div class="lbl">Coin Balance</div></div>
<div class="col"><div class="num sm">LV.4392</div><div class="lbl">Level</div></div>
</body></html>
