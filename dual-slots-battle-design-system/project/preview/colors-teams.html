<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; padding:16px; background:#061a33; font-family:var(--font-body); display:flex; gap:16px; }
.side { flex:1; border-radius:12px; padding:18px; color:#fff; text-align:center; font-weight:800; letter-spacing:0.22em; font-size:13px; }
.side .hex { display:block; font-weight:400; letter-spacing:0; opacity:0.75; margin-top:4px; font-family:var(--font-num); }
.azure { background: linear-gradient(180deg,#6ab7ff,#2f88e8 45%,#164d8f); box-shadow: var(--glow-azure); }
.verm { background: linear-gradient(180deg,#ff8a6a,#e84a3c 45%,#8a1e12); box-shadow: var(--glow-vermilion); }
.bar { flex:0 0 2px; background: var(--grad-gold-v); border-radius:1px; }
</style></head><body>
<div class="side azure">青龍 · PLAYER A<span class="hex">#2F88E8</span></div>
<div class="bar"></div>
<div class="side verm">朱雀 · PLAYER B<span class="hex">#E84A3C</span></div>
</body></html>
