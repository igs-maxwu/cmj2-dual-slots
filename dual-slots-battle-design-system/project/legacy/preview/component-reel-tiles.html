<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
<p class="label">Reel tile — 7 symbol shapes</p>
<svg width="640" height="90" viewBox="0 0 640 90">
  <!-- diamond (Man) -->
  <rect x="4" y="10" width="82" height="70" fill="#0d0d1a" stroke="#334466"/>
  <polygon points="45,22 70,45 45,68 20,45" fill="#FF6B6B"/>
  <!-- circle (Pin) -->
  <rect x="94" y="10" width="82" height="70" fill="#0d0d1a" stroke="#334466"/>
  <circle cx="135" cy="45" r="22" fill="#48CAE4"/>
  <!-- rectangle tall (Sou) -->
  <rect x="184" y="10" width="82" height="70" fill="#0d0d1a" stroke="#334466"/>
  <rect x="214" y="20" width="22" height="50" fill="#52B788"/>
  <!-- hex (wind) -->
  <rect x="274" y="10" width="82" height="70" fill="#0d0d1a" stroke="#334466"/>
  <polygon points="315,22 332,32 332,58 315,68 298,58 298,32" fill="#FFD166"/>
  <!-- triangle (dragon) -->
  <rect x="364" y="10" width="82" height="70" fill="#0d0d1a" stroke="#334466"/>
  <polygon points="405,22 428,66 382,66" fill="#EF9B0F"/>
  <!-- open square (Bai) -->
  <rect x="454" y="10" width="82" height="70" fill="#0d0d1a" stroke="#334466"/>
  <rect x="478" y="27" width="34" height="34" fill="none" stroke="#F8F9FA" stroke-width="3"/>
  <!-- 5-star wild -->
  <rect x="544" y="10" width="82" height="70" fill="#0d0d1a" stroke="#334466"/>
  <polygon points="585,24 592,42 611,42 596,54 602,72 585,62 568,72 574,54 559,42 578,42" fill="#B5179E"/>
</svg>
</body></html>
