<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; padding:16px; background:#061a33; font-family:var(--font-body); }
.row { display:flex; gap:10px; }
.sw { flex:1; height:88px; border-radius:8px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; color:#fff; font-size:11px; font-weight:700; text-shadow:0 1px 3px rgba(0,0,0,0.8); box-shadow:inset 0 0 0 1px rgba(255,255,255,0.08); }
.hex { opacity:0.75; font-weight:400; font-family:var(--font-num); }
</style></head><body>
<div class="row">
  <div class="sw" style="background:#061a33">sea-abyss<div class="hex">#061A33</div></div>
  <div class="sw" style="background:#0b2f5e">sea-deep<div class="hex">#0B2F5E</div></div>
  <div class="sw" style="background:#1b5a8a">sea-mid<div class="hex">#1B5A8A</div></div>
  <div class="sw" style="background:#3aa8c9">sea-light<div class="hex">#3AA8C9</div></div>
  <div class="sw" style="background:#7ad7e8; color:#061a33; text-shadow:none">sea-caustic<div class="hex">#7AD7E8</div></div>
</div>
</body></html>
