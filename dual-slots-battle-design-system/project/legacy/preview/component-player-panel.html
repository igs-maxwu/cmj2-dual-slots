<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
<p class="label">Player panel — full chrome</p>
<div style="width:211px;background:#1a1a2e;border:1px solid #3498db;padding:12px;box-sizing:border-box;font-family:var(--font-ui)">
  <div style="text-align:center;color:#3498db;font-weight:700;letter-spacing:.25em;font-size:13px">PLAYER A</div>
  <div style="height:1px;background:#3498db;opacity:.4;margin:8px 0"></div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin:6px 0">
    <div style="aspect-ratio:1;background:#16213e;border:2px solid #3498db"></div>
    <div style="aspect-ratio:1;background:#16213e;border:2px solid #3498db"></div>
    <div style="aspect-ratio:1;background:#16213e;border:2px solid #3498db"></div>
    <div style="aspect-ratio:1;background:#16213e;border:1px solid #334466"></div>
    <div style="aspect-ratio:1;background:#16213e;border:1px solid #334466"></div>
    <div style="aspect-ratio:1;background:#16213e;border:1px solid #334466"></div>
    <div style="aspect-ratio:1;background:#16213e;border:1px solid #334466"></div>
    <div style="aspect-ratio:1;background:#16213e;border:1px solid #334466"></div>
    <div style="aspect-ratio:1;background:#16213e;border:1px solid #334466"></div>
  </div>
  <div style="text-align:center;color:#7f8c9a;font-size:10px;letter-spacing:.18em;margin-top:10px">COIN</div>
  <div style="text-align:center;color:#f1c40f;font-weight:700;font-size:16px">$1,000</div>
  <div style="text-align:center;color:#7f8c9a;font-size:12px;margin-top:2px">BET: $100</div>
  <div style="text-align:center;color:#e67e22;font-weight:700;font-size:12px;margin-top:4px">DMG: 450</div>
  <div style="text-align:center;color:#b5179e;font-size:10px;margin-top:6px">★ Dragon Charge</div>
</div>
</body></html>
