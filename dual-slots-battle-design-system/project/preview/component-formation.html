<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; padding:16px; background:#061a33; font-family:var(--font-body); display:flex; gap:12px; align-items:center; justify-content:center; }
.cell { width:70px; height:70px; border-radius:10px; background:#061a33; position:relative; display:flex; align-items:center; justify-content:center; box-shadow: 0 0 0 2px #8a5412, inset 0 0 0 1px rgba(255,215,100,0.3), inset 0 -3px 6px rgba(0,0,0,0.5), inset 0 2px 2px rgba(255,255,255,0.12); }
.cell.azure { box-shadow: 0 0 0 2px #2f88e8, 0 0 12px rgba(106,183,255,0.4), inset 0 0 0 1px rgba(106,183,255,0.3); }
.cell.verm { box-shadow: 0 0 0 2px #e84a3c, 0 0 12px rgba(255,138,106,0.4), inset 0 0 0 1px rgba(255,138,106,0.3); }
.cell img { width:58px; height:58px; object-fit:contain; }
.cell.dead { background:#220000; }
.cell.dead::after { content:'✕'; color:#cc2222; font-size:32px; font-weight:800; text-shadow:0 2px 4px rgba(0,0,0,0.7); }
.cell.empty { background:rgba(8,28,54,0.5); box-shadow: inset 0 0 0 1px rgba(139,84,18,0.4); }
.lbl { color:#7ea3c7; font-size:9px; letter-spacing:0.14em; text-transform:uppercase; margin-top:4px; font-weight:700; text-align:center; }
.col { display:flex; flex-direction:column; align-items:center; }
</style></head><body>
<div class="col"><div class="cell azure"><img src="../assets/spirits/canlan.png"></div><div class="lbl">Azure · Alive</div></div>
<div class="col"><div class="cell verm"><img src="../assets/spirits/luoluo.png"></div><div class="lbl">Verm · Alive</div></div>
<div class="col"><div class="cell dead"></div><div class="lbl">Dead</div></div>
<div class="col"><div class="cell empty"></div><div class="lbl">Empty</div></div>
</body></html>
