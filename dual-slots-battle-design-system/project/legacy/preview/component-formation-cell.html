<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
<p class="label">Formation cell — alive / dead / empty</p>
<div class="row" style="gap:10px;align-items:flex-start">
  <div style="width:84px;height:84px;background:#16213e;border:2px solid #3498db;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:6px;box-sizing:border-box">
    <div style="width:52px;height:52px;background:url('../assets/spirits/canlan.png') center/contain no-repeat;margin-bottom:4px"></div>
    <div style="font-size:10px;color:#fff">蒼嵐</div>
    <div style="position:absolute;bottom:4px;left:6px;right:6px;height:4px;background:#333"><div style="width:70%;height:100%;background:#2ecc71"></div></div>
  </div>
  <div style="width:84px;height:84px;background:#220000;border:2px solid #3498db;position:relative;display:flex;align-items:center;justify-content:center">
    <span style="font-size:24px;color:#cc2222;font-weight:700">✕</span>
  </div>
  <div style="width:84px;height:84px;background:#16213e;border:1px solid #334466"></div>
  <div style="width:84px;height:84px;background:#16213e;border:2px solid #e74c3c;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:6px;box-sizing:border-box">
    <div style="width:52px;height:52px;background:url('../assets/spirits/yin.png') center/contain no-repeat;margin-bottom:4px"></div>
    <div style="font-size:10px;color:#fff">寅</div>
    <div style="position:absolute;bottom:4px;left:6px;right:6px;height:4px;background:#333"><div style="width:35%;height:100%;background:#e67e22"></div></div>
  </div>
</div>
</body></html>
