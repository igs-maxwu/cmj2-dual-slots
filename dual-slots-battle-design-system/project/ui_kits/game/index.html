<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <title>雀靈戰記 · Game UI Kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css"/>
  <style>
    html, body { margin:0; padding:0; background:#000; min-height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    #stage-wrap { width:1280px; height:720px; transform-origin: center center; }
  </style>
</head>
<body>
  <div id="stage-wrap"><div id="root"></div></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="./GameScene.jsx"></script>
  <script type="text/babel">
    function scale() {
      const el = document.getElementById('stage-wrap');
      const s = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
      el.style.transform = `scale(${s})`;
    }
    window.addEventListener('resize', scale); scale();
    ReactDOM.createRoot(document.getElementById('root')).render(<GameScene/>);
  </script>
</body>
</html>
