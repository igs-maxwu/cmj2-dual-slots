<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; padding:16px; background:#061a33; font-family:var(--font-body); }
.row { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.name { width:60px; font-size:12px; color:#fff6da; font-family:var(--font-title); font-weight:700; }
.bar-wrap { flex:1; height:14px; background:#1a0f0f; border-radius:999px; overflow:hidden; position:relative; box-shadow:inset 0 1px 2px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(139,84,18,0.6); }
.bar { height:100%; border-radius:999px; position:relative; box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -2px 0 rgba(0,0,0,0.25); }
.high { background: linear-gradient(180deg,#7fe9a3,#39d274 55%,#1a8040); }
.mid { background: linear-gradient(180deg,#ffd27a,#ffb020 55%,#a56800); }
.low { background: linear-gradient(180deg,#ff8a7a,#e84a3c 55%,#8a1e12); }
.dead { background:#2a0808; }
.num { width:50px; text-align:right; font-family:var(--font-num); font-weight:800; color:#fff; font-size:13px; }
</style></head><body>
<div class="row"><div class="name">蒼嵐</div><div class="bar-wrap"><div class="bar high" style="width:95%"></div></div><div class="num">1900</div></div>
<div class="row"><div class="name">凌羽</div><div class="bar-wrap"><div class="bar mid" style="width:45%"></div></div><div class="num">810</div></div>
<div class="row"><div class="name">珞洛</div><div class="bar-wrap"><div class="bar low" style="width:18%"></div></div><div class="num">324</div></div>
<div class="row"><div class="name">寅</div><div class="bar-wrap"><div class="bar dead" style="width:100%"></div></div><div class="num" style="color:#6a7a8f">KO</div></div>
</body></html>
