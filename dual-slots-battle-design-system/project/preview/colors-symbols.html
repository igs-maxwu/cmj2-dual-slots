<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; padding:16px; background:#061a33; font-family:var(--font-body); }
.grid { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; }
.cell { aspect-ratio:1; border-radius:10px; position:relative; box-shadow: inset 0 -3px 0 rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.25); display:flex; align-items:flex-end; justify-content:center; padding:4px; font-size:9px; color:#fff; font-weight:700; text-shadow:0 1px 2px rgba(0,0,0,0.7); }
</style></head><body>
<div class="grid">
  <div class="cell" style="background:radial-gradient(circle at 30% 25%,#e8c9a0,#c9a27a 60%,#7a5a3d)">sym-low-1</div>
  <div class="cell" style="background:radial-gradient(circle at 30% 25%,#d4b0ee,#b388d6 60%,#6f4c95)">sym-low-2</div>
  <div class="cell" style="background:radial-gradient(circle at 30% 25%,#ffe9a8,#ffd27a 60%,#aa7f3a)">sym-low-3</div>
  <div class="cell" style="background:radial-gradient(circle at 30% 25%,#9eecc9,#5fc29a 60%,#2a7053)">sym-mid-1</div>
  <div class="cell" style="background:radial-gradient(circle at 30% 25%,#ffb0bf,#ff6b88 60%,#8a2a3f)">sym-mid-2</div>
  <div class="cell" style="background:radial-gradient(circle at 30% 25%,#cfa8e8,#a06bd8 60%,#4e2e83)">sym-mid-3</div>
  <div class="cell" style="background:radial-gradient(circle at 30% 25%,#ffd8a8,#ffb347 60%,#9e5e10)">sym-high-1</div>
  <div class="cell" style="background:radial-gradient(circle at 30% 25%,#b0eaf5,#4fd1e8 60%,#1f6a7d)">sym-high-2</div>
  <div class="cell" style="background:radial-gradient(circle at 30% 25%,#fff2a8,#ffe066 60%,#aa8b10); box-shadow: inset 0 -3px 0 rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.4), 0 0 10px rgba(255,224,102,0.6)">sym-wild</div>
  <div class="cell" style="background:radial-gradient(circle at 30% 25%,#ff8aa6,#ff3b6b 60%,#931b3f); box-shadow: inset 0 -3px 0 rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.4), 0 0 10px rgba(255,59,107,0.6)">sym-scatter</div>
</div>
</body></html>
