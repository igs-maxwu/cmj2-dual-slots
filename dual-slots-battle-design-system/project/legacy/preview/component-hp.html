<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
<p class="label">HP bars — three fill states</p>
<div style="display:flex;flex-direction:column;gap:12px">
  <div class="row" style="align-items:center;gap:14px">
    <div style="width:220px;height:10px;background:#333"><div style="width:85%;height:100%;background:#2ecc71"></div></div>
    <span class="mono" style="font-size:11px;color:#7f8c9a">hp-high · &gt; 50%</span>
  </div>
  <div class="row" style="align-items:center;gap:14px">
    <div style="width:220px;height:10px;background:#333"><div style="width:42%;height:100%;background:#e67e22"></div></div>
    <span class="mono" style="font-size:11px;color:#7f8c9a">hp-mid · 25–50%</span>
  </div>
  <div class="row" style="align-items:center;gap:14px">
    <div style="width:220px;height:10px;background:#333"><div style="width:12%;height:100%;background:#e74c3c"></div></div>
    <span class="mono" style="font-size:11px;color:#7f8c9a">hp-low · &lt; 25%</span>
  </div>
  <div class="row" style="align-items:center;gap:14px">
    <div style="width:220px;height:10px;background:#333"></div>
    <span class="mono" style="font-size:11px;color:#7f8c9a">dead</span>
  </div>
</div>
</body></html>
