<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
<p class="label">Spacing — 4px grid</p>
<div style="display:flex;align-items:flex-end;gap:10px">
  <div style="text-align:center"><div style="width:4px;height:4px;background:#f1c40f"></div><div class="mono" style="font-size:10px;margin-top:4px">4</div></div>
  <div style="text-align:center"><div style="width:8px;height:8px;background:#f1c40f"></div><div class="mono" style="font-size:10px;margin-top:4px">8</div></div>
  <div style="text-align:center"><div style="width:12px;height:12px;background:#f1c40f"></div><div class="mono" style="font-size:10px;margin-top:4px">12</div></div>
  <div style="text-align:center"><div style="width:16px;height:16px;background:#f1c40f"></div><div class="mono" style="font-size:10px;margin-top:4px">16</div></div>
  <div style="text-align:center"><div style="width:20px;height:20px;background:#f1c40f"></div><div class="mono" style="font-size:10px;margin-top:4px">20</div></div>
  <div style="text-align:center"><div style="width:24px;height:24px;background:#f1c40f"></div><div class="mono" style="font-size:10px;margin-top:4px">24</div></div>
  <div style="text-align:center"><div style="width:32px;height:32px;background:#f1c40f"></div><div class="mono" style="font-size:10px;margin-top:4px">32</div></div>
  <div style="text-align:center"><div style="width:40px;height:40px;background:#f1c40f"></div><div class="mono" style="font-size:10px;margin-top:4px">40</div></div>
  <div style="text-align:center"><div style="width:56px;height:56px;background:#f1c40f"></div><div class="mono" style="font-size:10px;margin-top:4px">56</div></div>
  <div style="text-align:center"><div style="width:64px;height:64px;background:#f1c40f"></div><div class="mono" style="font-size:10px;margin-top:4px">64</div></div>
</div>
<p class="label" style="margin-top:18px">Corners — zero-radius is the brand</p>
<div class="row">
  <div style="width:64px;height:48px;background:#16213e;border:1px solid #334466"></div>
  <div style="width:64px;height:48px;background:#1a1a2e;border:2px solid #3498db"></div>
  <div style="width:64px;height:48px;background:#1a1a2e;border:2px solid #f1c40f"></div>
  <div style="width:64px;height:48px;background:#e67e22"></div>
</div>
</body></html>
