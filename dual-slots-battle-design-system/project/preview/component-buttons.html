<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; padding:18px; background: linear-gradient(180deg,#0b2f5e,#061a33); font-family:var(--font-body); display:flex; gap:14px; align-items:center; justify-content:center; }
.btn { padding:14px 28px; border-radius:999px; border:2px solid #8a5412; font-weight:800; font-size:15px; letter-spacing:0.14em; font-family:var(--font-title); color:#fff; position:relative; box-shadow: 0 4px 0 rgba(0,0,0,0.35), 0 6px 14px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -3px 0 rgba(0,0,0,0.25); text-shadow:0 1px 2px rgba(0,0,0,0.55); cursor:pointer; }
.btn.green { background: linear-gradient(180deg,#58e090,#28c76f 45%,#16803d); border-color:#0f5e2c; }
.btn.gold { background: var(--grad-gold-v); color:#3a2a05; text-shadow:0 1px 0 rgba(255,255,255,0.4); border-color:#8a5412; }
.btn.red { background: linear-gradient(180deg,#ff8a6a,#e84a3c 45%,#9b1b1b); border-color:#5a0e0e; }
.btn.dark { background: linear-gradient(180deg,#2a4872,#12304e 45%,#061a33); border-color:#8a5412; }
.lbl { color:#7ea3c7; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; margin-top:6px; font-weight:700; text-align:center; }
.col { display:flex; flex-direction:column; align-items:center; gap:2px; }
</style></head><body>
<div class="col"><button class="btn green">押注</button><div class="lbl">CTA · Green</div></div>
<div class="col"><button class="btn gold">最大押注</button><div class="lbl">CTA · Gold</div></div>
<div class="col"><button class="btn red">離開戰局</button><div class="lbl">Danger</div></div>
<div class="col"><button class="btn dark">設定</button><div class="lbl">Secondary</div></div>
</body></html>
